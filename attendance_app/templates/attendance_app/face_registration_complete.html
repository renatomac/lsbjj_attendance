{% extends 'attendance_app/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Face Registration Complete!</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
                    </div>
                    <h4 class="mb-3">Thank You!</h4>
                    <p class="lead">Your face has been successfully registered in the system.</p>
                    <p>You can now use face recognition for quick check-ins.</p>
                    
                    <hr class="my-4">
                    
                    <div class="mt-4">
                        <a href="{% url 'profile' %}" class="btn btn-primary btn-lg me-2">
                            <i class="fas fa-user"></i> Go to Profile
                        </a>
                        <a href="{% url 'index' %}" class="btn btn-secondary btn-lg">
                            <i class="fas fa-home"></i> Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
